
<style>
#game-root{--c-grid-gap:#a0aec0;--c-cell-bg:#f7fafc;--c-cell-text:#1a202c;--c-cell-eaten-bg:#e2e8f0;--c-cell-eaten-text:#a0aec0;--c-frog-bg:#48bb78;--c-frog-border:#276749;--c-prompt-bg:#ebf8ff;--c-prompt-border:#90cdf4;--c-prompt-text:#2b6cb0;font-family:var(--font-sans);padding:1rem 0;user-select:none;}
#game-root[data-grade="K"]{--c-grid-gap:#f6ad55;--c-cell-bg:#fffaf0;--c-cell-text:#7b341e;--c-frog-bg:#68d391;--c-frog-border:#276749;--c-prompt-bg:#fefcbf;--c-prompt-border:#f6e05e;--c-prompt-text:#744210;}
#game-root[data-grade="1"]{--c-grid-gap:#76e4f7;--c-cell-bg:#ebfffe;--c-cell-text:#065666;--c-frog-bg:#68d391;--c-frog-border:#276749;--c-prompt-bg:#e6fffa;--c-prompt-border:#81e6d9;--c-prompt-text:#234e52;}
#game-root[data-grade="2"]{--c-grid-gap:#f687b3;--c-cell-bg:#fff5f7;--c-cell-text:#702459;--c-frog-bg:#68d391;--c-frog-border:#276749;--c-prompt-bg:#fed7e2;--c-prompt-border:#f687b3;--c-prompt-text:#702459;}
#game-root[data-grade="3"]{--c-grid-gap:#9f7aea;--c-cell-bg:#faf5ff;--c-cell-text:#44337a;--c-frog-bg:#68d391;--c-frog-border:#276749;--c-prompt-bg:#e9d8fd;--c-prompt-border:#9f7aea;--c-prompt-text:#44337a;}
#grid{display:grid;grid-template-columns:repeat(6,58px);gap:3px;background:var(--c-grid-gap);border:3px solid var(--c-grid-gap);border-radius:10px;overflow:hidden;}
.cell{width:58px;height:58px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;background:var(--c-cell-bg);color:var(--c-cell-text);transition:background 0.1s;}
.cell.eaten{background:var(--c-cell-eaten-bg);color:var(--c-cell-eaten-text);font-size:13px;text-decoration:line-through;}
.cell.munchie{background:var(--c-frog-bg);font-size:26px;box-shadow:inset 0 0 0 2px var(--c-frog-border);}
#prompt-box{background:var(--c-prompt-bg);border:1.5px solid var(--c-prompt-border);border-radius:10px;padding:12px 16px;max-width:200px;}
#prompt-label{font-size:10px;color:var(--c-prompt-text);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;opacity:.75;}
#prompt-text{font-size:17px;font-weight:600;color:var(--c-prompt-text);line-height:1.5;}
#cur-val-box{background:var(--c-prompt-bg);border:1.5px solid var(--c-prompt-border);border-radius:10px;padding:8px 14px;text-align:center;min-width:110px;}
#cur-val-label{font-size:11px;color:var(--c-prompt-text);opacity:.75;margin-bottom:3px;}
#cur-val{font-size:26px;font-weight:700;color:var(--c-prompt-text);}
.result-slot{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--c-cell-bg);border:1.5px solid var(--c-grid-gap);font-size:18px;flex-shrink:0;}
.result-slot.correct{background:#c6f6d5;border-color:#38a169;color:#276749;}
.result-slot.wrong{background:#fed7d7;border-color:#e53e3e;color:#9b2c2c;}
.grade-btn{padding:0;border:2px solid transparent;border-radius:12px;background:var(--color-background-primary);cursor:pointer;font-family:var(--font-sans);transition:transform 0.15s,box-shadow 0.15s;overflow:hidden;text-align:left;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.grade-btn:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12);}
.grade-btn:active{transform:scale(0.97);}
.grade-header{padding:12px 16px 8px;}.grade-label{font-size:18px;font-weight:600;margin:0 0 2px;}.grade-sub{font-size:12px;opacity:.7;margin:0;}
.grade-body{padding:4px 16px 14px;border-top:1px solid rgba(0,0,0,.06);}.grade-topics{font-size:12px;line-height:1.8;margin:6px 0 0;opacity:.85;}
.gk{border-top:4px solid #ed8936;background:linear-gradient(135deg,#fffaf0,#fefcbf);}.gk .grade-label,.gk .grade-sub,.gk .grade-topics{color:#7b341e;}
.g1{border-top:4px solid #0bc5ea;background:linear-gradient(135deg,#ebfffe,#e6fffa);}.g1 .grade-label,.g1 .grade-sub,.g1 .grade-topics{color:#065666;}
.g2{border-top:4px solid #ed64a6;background:linear-gradient(135deg,#fff5f7,#fed7e2);}.g2 .grade-label,.g2 .grade-sub,.g2 .grade-topics{color:#702459;}
.g3{border-top:4px solid #805ad5;background:linear-gradient(135deg,#faf5ff,#e9d8fd);}.g3 .grade-label,.g3 .grade-sub,.g3 .grade-topics{color:#44337a;}

.overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;border-radius:10px;overflow:hidden;}

/* Canvas sits in the MIDDLE of the stack so it renders over the grid
   but text content floats above it */
#fw-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;will-change:transform;z-index:1;}

/* Win message: no opaque card — text floats above fireworks.
   Heavy text-shadow stack creates a dark halo that keeps white text
   readable against any particle color. Buttons get a semi-transparent
   dark pill so they're always clickable and legible. */
.overlay-content{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  /* transparent — fireworks show through */
  background:transparent;
  border-radius:12px;padding:20px 28px;
}
.overlay-content.win-content h2,
.overlay-content.win-content p {
  color:#fff;
  /* stacked text-shadow: tight dark halo + soft outer glow for depth */
  text-shadow:
    0 0 4px rgba(0,0,0,0.9),
    0 0 8px rgba(0,0,0,0.7),
    0 1px 2px rgba(0,0,0,1),
    0 2px 6px rgba(0,0,0,0.6);
}
.overlay-content.win-content .btn-row button {
  background:rgba(0,0,0,0.45);
  color:#fff;
  border:1.5px solid rgba(255,255,255,0.5);
  text-shadow:0 1px 2px rgba(0,0,0,0.8);
}
.overlay-content.win-content .btn-row button:hover {
  background:rgba(0,0,0,0.65);
}

/* Lose message keeps the white card — no fireworks on lose */
.overlay-content.lose-content{
  background:rgba(255,255,255,0.92);
  animation:fadeInUp 0.4s ease 0.15s both;
}

.overlay h2{font-size:20px;font-weight:700;margin:0;color:var(--color-text-primary);}
.overlay p{margin:0;font-size:14px;color:var(--color-text-secondary);text-align:center;max-width:240px;line-height:1.6;}
button.action-btn{padding:9px 22px;border-radius:8px;font-size:14px;font-family:var(--font-sans);cursor:pointer;font-weight:500;}
#screen-grade{display:flex;flex-direction:column;gap:16px;}
#screen-game{display:none;flex-direction:column;gap:0;}
.snd-btn{font-size:18px;cursor:pointer;background:none;border:none;padding:2px 6px;border-radius:6px;line-height:1;}
.snd-btn:hover{background:var(--color-background-secondary);}
@keyframes wobble{0%,100%{transform:rotate(0deg) scale(1);}15%{transform:rotate(-8deg) scale(1.1);}30%{transform:rotate(7deg) scale(1.05);}45%{transform:rotate(-6deg) scale(1.08);}60%{transform:rotate(5deg) scale(1.04);}75%{transform:rotate(-3deg) scale(1.02);}}
@keyframes dizzy-orbit{from{transform:rotate(0deg) translateX(38px) rotate(0deg);}to{transform:rotate(360deg) translateX(38px) rotate(-360deg);}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.lose-frog{font-size:56px;display:inline-block;animation:wobble 0.7s ease 0.1s 3;}
.dizzy-wrap{position:relative;width:80px;height:80px;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;}
.dizzy-star{position:absolute;top:50%;left:50%;font-size:16px;animation:dizzy-orbit 1s linear infinite;}
</style>

<div id="game-root" tabindex="0">
<div id="screen-grade">
  <div style="display:flex;align-items:center;justify-content:space-between;max-width:560px;">
    <div>
      <div style="font-size:24px;font-weight:700;color:var(--color-text-primary);margin-bottom:4px;">🐸 Munchie's Math Munch</div>
      <div style="font-size:14px;color:var(--color-text-secondary);">Pick a grade to get started</div>
    </div>
    <button class="snd-btn" id="snd0" title="Toggle sound" onclick="toggleSound()">🔊</button>
  </div>

    <button class="grade-btn gk" onclick="selectGrade('K')"><div class="grade-header"><p class="grade-label">Kindergarten</p><p class="grade-sub">Ages 5–6</p></div><div class="grade-body"><p class="grade-topics">• Numbers 1 to 10<br>• Greater than a number<br>• Less than a number</p></div></button>
    <button class="grade-btn g1" onclick="selectGrade('1')"><div class="grade-header"><p class="grade-label">Grade 1</p><p class="grade-sub">Ages 6–7</p></div><div class="grade-body"><p class="grade-topics">• Numbers 1 to 20<br>• Odd and even<br>• Equations with + and −</p></div></button>
    <button class="grade-btn g2" onclick="selectGrade('2')"><div class="grade-header"><p class="grade-label">Grade 2</p><p class="grade-sub">Ages 7–8</p></div><div class="grade-body"><p class="grade-topics">• Two-digit numbers<br>• Even / odd<br>• Harder + and − equations</p></div></button>
    <button class="grade-btn g3" onclick="selectGrade('3')"><div class="grade-header"><p class="grade-label">Grade 3</p><p class="grade-sub">Ages 8–9</p></div><div class="grade-body"><p class="grade-topics">• Multiples of 2 through 9<br>• × and ÷ equations<br>• Odd and even</p></div></button>

<div id="screen-game">
  <div style="display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;">
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;gap:10px;align-items:center;">
        <div id="cur-val-box"><div id="cur-val-label">on this square</div><div id="cur-val">—</div></div>
        <div style="font-size:12px;color:var(--color-text-secondary);line-height:1.9;">↑↓←→ move<br>Space eat</div>
        <button class="snd-btn" id="snd1" title="Toggle sound" onclick="toggleSound()">🔊</button>

        <div id="grid"></div>

      <div>
        <div style="font-size:10px;color:var(--color-text-secondary);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;">Correct</div>

      <button class="action-btn" onclick="goGradeSelect()" style="font-size:12px;padding:6px 14px;margin-top:6px;">← Change grade</button>
    </div>
  </div>
</div>
</div>

<script>
let actx=null,soundOn=true;
function getACtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();return actx;}
function toggleSound(){soundOn=!soundOn;const ic=soundOn?'🔊':'🔇';document.getElementById('snd0').textContent=ic;document.getElementById('snd1').textContent=ic;}
function playNote(type,freq,t,dur,vol=0.28,startHz=null){const ac=getACtx(),osc=ac.createOscillator(),gain=ac.createGain();osc.connect(gain);gain.connect(ac.destination);osc.type=type;if(startHz){osc.frequency.setValueAtTime(startHz,t);osc.frequency.linearRampToValueAtTime(freq,t+dur*0.6);}else osc.frequency.setValueAtTime(freq,t);gain.gain.setValueAtTime(0,t);gain.gain.linearRampToValueAtTime(vol,t+0.01);gain.gain.setValueAtTime(vol,t+dur*0.5);gain.gain.exponentialRampToValueAtTime(0.0001,t+dur);osc.start(t);osc.stop(t+dur+0.05);}
function playNoiseBurst(t,dur=0.08,vol=0.12){const ac=getACtx(),bufLen=Math.ceil(ac.sampleRate*dur),buf=ac.createBuffer(1,bufLen,ac.sampleRate),data=buf.getChannelData(0);for(let i=0;i<bufLen;i++)data[i]=Math.random()*2-1;const src=ac.createBufferSource(),hpf=ac.createBiquadFilter(),gain=ac.createGain();src.buffer=buf;hpf.type='highpass';hpf.frequency.value=1800;gain.gain.setValueAtTime(vol,t);gain.gain.exponentialRampToValueAtTime(0.0001,t+dur);src.connect(hpf);hpf.connect(gain);gain.connect(ac.destination);src.start(t);src.stop(t+dur+0.02);}
function sfxMove(){if(!soundOn)return;const ac=getACtx(),now=ac.currentTime;playNote('sine',320,now,0.08,0.10,300);}
function sfxCorrect(){if(!soundOn)return;const ac=getACtx(),now=ac.currentTime;playNote('sine',523.25,now,0.18,0.30);playNote('sine',659.25,now+0.1,0.22,0.28);}
function sfxWrong(){if(!soundOn)return;const ac=getACtx(),now=ac.currentTime;playNote('sawtooth',174.61,now,0.35,0.18,220.00);}
function sfxWin(){if(!soundOn)return;const ac=getACtx(),now=ac.currentTime;const notes=[523.25,659.25,783.99,1046.50];notes.forEach((f,i)=>{playNote('sine',f,now+i*0.13,0.30,0.26);playNote('triangle',f,now+i*0.13,0.28,0.10);});playNote('sine',1318.51,now+0.6,0.4,0.14);}
function sfxLose(){if(!soundOn)return;const ac=getACtx(),now=ac.currentTime;playNote('triangle',261.63,now,0.4,0.22,300);playNote('triangle',220.00,now+0.35,0.4,0.20,280);playNote('triangle',174.61,now+0.70,0.5,0.18,240);}
function sfxFireworkPop(){if(!soundOn)return;const ac=getACtx(),now=ac.currentTime;playNoiseBurst(now,0.07,0.10);const pf=[1046.50,1174.66,1318.51,1396.91,1567.98];playNote('sine',pf[Math.floor(Math.random()*pf.length)],now+0.01,0.18,0.12);}

const PROMPTS={
  K:[{text:"greater than 3",fn:n=>n>3,gen:()=>ri(1,10)},{text:"less than 4",fn:n=>n<4,gen:()=>ri(1,10)},{text:"greater than 5",fn:n=>n>5,gen:()=>ri(1,10)},{text:"less than 6",fn:n=>n<6,gen:()=>ri(1,10)},{text:"greater than 7",fn:n=>n>7,gen:()=>ri(1,10)},{text:"less than 3",fn:n=>n<3,gen:()=>ri(1,10)},{text:"greater than 2",fn:n=>n>2,gen:()=>ri(1,10)},{text:"less than 8",fn:n=>n<8,gen:()=>ri(1,10)}],
  1:[{text:"odd numbers",fn:n=>n%2!==0,gen:()=>ri(1,20)},{text:"even numbers",fn:n=>n%2===0,gen:()=>ri(1,20)},{text:"greater than 10",fn:n=>n>10,gen:()=>ri(1,20)},{text:"less than 10",fn:n=>n<10,gen:()=>ri(1,20)},{text:"greater than 14",fn:n=>n>14,gen:()=>ri(1,20)},{text:"less than 6",fn:n=>n<6,gen:()=>ri(1,20)},{text:"greater than 3 + 5",fn:n=>n>8,gen:()=>ri(1,20)},{text:"less than 6 + 7",fn:n=>n<13,gen:()=>ri(1,20)},{text:"greater than 9 + 4",fn:n=>n>13,gen:()=>ri(1,20)},{text:"less than 8 + 3",fn:n=>n<11,gen:()=>ri(1,20)},{text:"greater than 12 − 4",fn:n=>n>8,gen:()=>ri(1,20)},{text:"less than 15 − 3",fn:n=>n<12,gen:()=>ri(1,20)},{text:"greater than 10 − 6",fn:n=>n>4,gen:()=>ri(1,20)},{text:"less than 18 − 5",fn:n=>n<13,gen:()=>ri(1,20)}],
  2:[{text:"even numbers",fn:n=>n%2===0,gen:()=>ri(10,99)},{text:"odd numbers",fn:n=>n%2!==0,gen:()=>ri(10,99)},{text:"greater than 50",fn:n=>n>50,gen:()=>ri(10,99)},{text:"less than 50",fn:n=>n<50,gen:()=>ri(10,99)},{text:"between 40 and 49",fn:n=>n>=40&&n<=49,gen:()=>ri(10,99)},{text:"between 60 and 69",fn:n=>n>=60&&n<=69,gen:()=>ri(10,99)},{text:"between 20 and 29",fn:n=>n>=20&&n<=29,gen:()=>ri(10,99)},{text:"greater than 30 + 12",fn:n=>n>42,gen:()=>ri(10,99)},{text:"less than 20 + 35",fn:n=>n<55,gen:()=>ri(10,99)},{text:"greater than 45 + 14",fn:n=>n>59,gen:()=>ri(10,99)},{text:"less than 61 + 18",fn:n=>n<79,gen:()=>ri(10,99)},{text:"greater than 22 + 31",fn:n=>n>53,gen:()=>ri(10,99)},{text:"less than 80 − 15",fn:n=>n<65,gen:()=>ri(10,99)},{text:"greater than 70 − 24",fn:n=>n>46,gen:()=>ri(10,99)},{text:"less than 95 − 30",fn:n=>n<65,gen:()=>ri(10,99)},{text:"greater than 60 − 17",fn:n=>n>43,gen:()=>ri(10,99)},{text:"less than 50 − 11",fn:n=>n<39,gen:()=>ri(10,99)}],
  3:[{text:"multiples of 2",fn:n=>n%2===0&&n!==2,gen:()=>riX(4,60,[2])},{text:"multiples of 3",fn:n=>n%3===0&&n!==3,gen:()=>riX(4,60,[3])},{text:"multiples of 4",fn:n=>n%4===0&&n!==4,gen:()=>riX(5,60,[4])},{text:"multiples of 5",fn:n=>n%5===0&&n!==5,gen:()=>riX(6,60,[5])},{text:"multiples of 6",fn:n=>n%6===0&&n!==6,gen:()=>riX(7,60,[6])},{text:"multiples of 7",fn:n=>n%7===0&&n!==7,gen:()=>riX(8,60,[7])},{text:"multiples of 8",fn:n=>n%8===0&&n!==8,gen:()=>riX(9,60,[8])},{text:"multiples of 9",fn:n=>n%9===0&&n!==9,gen:()=>riX(10,60,[9])},{text:"odd numbers",fn:n=>n%2!==0,gen:()=>ri(1,60)},{text:"even numbers",fn:n=>n%2===0,gen:()=>ri(2,60)},{text:"greater than 4 × 3",fn:n=>n>12,gen:()=>ri(1,60)},{text:"less than 6 × 4",fn:n=>n<24,gen:()=>ri(1,60)},{text:"greater than 7 × 3",fn:n=>n>21,gen:()=>ri(1,60)},{text:"less than 5 × 8",fn:n=>n<40,gen:()=>ri(1,60)},{text:"greater than 3 × 9",fn:n=>n>27,gen:()=>ri(1,60)},{text:"less than 6 × 7",fn:n=>n<42,gen:()=>ri(1,60)},{text:"greater than 24 ÷ 4",fn:n=>n>6,gen:()=>ri(1,60)},{text:"less than 36 ÷ 3",fn:n=>n<12,gen:()=>ri(1,60)},{text:"greater than 45 ÷ 5",fn:n=>n>9,gen:()=>ri(1,60)},{text:"less than 56 ÷ 7",fn:n=>n<8,gen:()=>ri(1,60)},{text:"greater than 32 ÷ 4",fn:n=>n>8,gen:()=>ri(1,60)},{text:"less than 63 ÷ 9",fn:n=>n<7,gen:()=>ri(1,60)}]
};

function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function riX(a,b,excl){let v,t=0;do{v=ri(a,b);t++;}while(excl.includes(v)&&t<200);return v;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

const MIN_UNIQUE=3,deckState={};
function initDeck(g){const i=PROMPTS[g].map((_,i)=>i);shuffle(i);deckState[g]={deck:i,recentWins:[]};}
function pickPrompt(g){if(!deckState[g])initDeck(g);const ds=deckState[g],pr=PROMPTS[g],bl=new Set(ds.recentWins);let pos=ds.deck.findIndex(i=>!bl.has(pr[i].text));if(pos===-1)pos=0;const ch=ds.deck.splice(pos,1)[0];if(ds.deck.length===0){const a=pr.map((_,i)=>i);shuffle(a);ds.deck=a;}return pr[ch];}
function recordWin(g,t){const ds=deckState[g];ds.recentWins.push(t);if(ds.recentWins.length>MIN_UNIQUE)ds.recentWins.shift();}

let fwRAF=null;
const FW_COLORS=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#f06595','#74c0fc','#a9e34b','#ff99c8'];
function stopFireworks(){if(fwRAF){cancelAnimationFrame(fwRAF);fwRAF=null;}const cv=document.getElementById('fw-canvas');cv.getContext('2d').clearRect(0,0,cv.width,cv.height);}
function launchFireworks(){
  const cv=document.getElementById('fw-canvas'),ov=document.getElementById('end-overlay');
  cv.width=ov.offsetWidth||370;cv.height=ov.offsetHeight||375;
  const ctx=cv.getContext('2d'),particles=[];
  function mkP(x,y,color){const a=Math.random()*Math.PI*2,s=0.6+Math.random()*2.8;return{x,y,color,vx:Math.cos(a)*s,vy:Math.sin(a)*s,alpha:1,radius:0.8+Math.random()*1.4,decay:0.006+Math.random()*0.006,gravity:0.04};}
  function burst(x,y){const color=FW_COLORS[Math.floor(Math.random()*FW_COLORS.length)];for(let i=0;i<55+Math.floor(Math.random()*16);i++)particles.push(mkP(x,y,color));sfxFireworkPop();}
  const burstTimes=[0,400,800,1300,1800,2300,2900,3500,4000,4500];
  const start=performance.now();
  burstTimes.forEach(d=>setTimeout(()=>burst(ri(cv.width*0.1,cv.width*0.9),ri(cv.height*0.08,cv.height*0.65)),d));
  function frame(now){
    ctx.fillStyle='rgba(255,255,255,0.14)';ctx.fillRect(0,0,cv.width,cv.height);
    for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity;p.vx*=0.99;p.vy*=0.99;p.alpha-=p.decay;if(p.alpha<=0){particles.splice(i,1);continue;}ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;
    if(now-start<6500||particles.length>0)fwRAF=requestAnimationFrame(frame);else ctx.clearRect(0,0,cv.width,cv.height);
  }
  fwRAF=requestAnimationFrame(frame);
}

const GS=6,CX=2,CY=2,WIN=3,LOSE=3;
let G={},grade=null;

function selectGrade(g){grade=g;document.getElementById('game-root').dataset.grade=g;if(!deckState[g])initDeck(g);document.getElementById('screen-grade').style.display='none';document.getElementById('screen-game').style.display='flex';initGame();}
function goGradeSelect(){stopFireworks();document.getElementById('screen-grade').style.display='flex';document.getElementById('screen-game').style.display='none';}
function restartSame(){stopFireworks();initGame();}
function idx(r,c){return r*GS+c;}

function initGame(){
  const prompt=pickPrompt(grade);
  const positions=[];for(let r=0;r<GS;r++)for(let c=0;c<GS;c++)if(!(r===CX&&c===CY))positions.push(idx(r,c));
  shuffle(positions);
  const cells=Array.from({length:GS*GS},(_,i)=>{const r=Math.floor(i/GS),c=i%GS;return{val:(r===CX&&c===CY)?null:prompt.gen(),eaten:false};});
  const ensure=(fn,n)=>{const oth=positions.filter(p=>!fn(cells[p].val));shuffle(oth);let have=positions.filter(p=>fn(cells[p].val)).length,pi=0;while(have<n&&pi<oth.length){let v,t=0;do{v=prompt.gen();t++;}while(!fn(v)&&t<200);if(fn(v)){cells[oth[pi]].val=v;have++;}pi++;}};
  ensure(prompt.fn,6);ensure(v=>!prompt.fn(v),8);
  G={cells,frog:{r:CX,c:CY},prompt,correct:0,wrong:0,over:false};
  document.getElementById('prompt-text').textContent=prompt.text;
  for(let i=0;i<3;i++)['c','w'].forEach(t=>{const el=document.getElementById(t+i);el.className='result-slot';el.textContent='';});
  document.getElementById('end-overlay').style.display='none';
  document.getElementById('overlay-content').className='overlay-content';
  updateCurVal();renderGrid();
}

function renderGrid(){
  const g=document.getElementById('grid');g.innerHTML='';
  for(let r=0;r<GS;r++)for(let c=0;c<GS;c++){
    const cd=G.cells[idx(r,c)],isFrog=G.frog.r===r&&G.frog.c===c;
    const d=document.createElement('div');d.className='cell';
    if(isFrog){d.classList.add('munchie');d.textContent='🐸';}
    else if(cd.eaten){d.classList.add('eaten');d.textContent=cd.val??'';}
    else if(cd.val!==null){d.textContent=cd.val;}
    g.appendChild(d);
  }
}

function updateCurVal(){const cd=G.cells[idx(G.frog.r,G.frog.c)];document.getElementById('cur-val').textContent=(cd.val===null||cd.eaten)?'—':cd.val;}

function move(dr,dc){if(G.over)return;const nr=G.frog.r+dr,nc=G.frog.c+dc;if(nr<0||nr>=GS||nc<0||nc>=GS)return;G.frog={r:nr,c:nc};sfxMove();updateCurVal();renderGrid();}

function eat(){
  if(G.over)return;
  const cd=G.cells[idx(G.frog.r,G.frog.c)];
  if(cd.val===null||cd.eaten)return;
  cd.eaten=true;
  const ok=G.prompt.fn(cd.val);
  if(ok){const s=document.getElementById('c'+G.correct);s.classList.add('correct');s.textContent='✓';G.correct++;sfxCorrect();if(G.correct>=WIN)endGame(true);}
  else{const s=document.getElementById('w'+G.wrong);s.classList.add('wrong');s.textContent='✗';G.wrong++;sfxWrong();if(G.wrong>=LOSE)endGame(false);}
  updateCurVal();renderGrid();
}

function endGame(won){
  G.over=true;
  const ov=document.getElementById('end-overlay'),ct=document.getElementById('overlay-content');
  ov.style.display='flex';
  if(won){
    ov.style.background='transparent';
    ct.className='overlay-content win-content';
    document.getElementById('ov-anim').innerHTML='<span style="font-size:48px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))">🎉</span>';
    document.getElementById('ov-title').textContent='Amazing job!';
    document.getElementById('ov-msg').textContent="Munchie ate all the right numbers! You're a math star!";
    sfxWin();launchFireworks();recordWin(grade,G.prompt.text);
  } else {
    ov.style.background='rgba(255,255,255,0.92)';
    ct.className='overlay-content lose-content';
    document.getElementById('ov-anim').innerHTML=`<div class="dizzy-wrap"><span class="lose-frog">🐸</span><span class="dizzy-star" style="animation-delay:0s">⭐</span><span class="dizzy-star" style="animation-delay:-0.33s">⭐</span><span class="dizzy-star" style="animation-delay:-0.66s">⭐</span></div>`;
    document.getElementById('ov-title').textContent='Oof! Tummy ache!';
    document.getElementById('ov-msg').textContent="Munchie ate too many wrong numbers and his tummy hurts! Let's try again!";
    sfxLose();
  }
}

document.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
  if(!G.frog)return;
  if(e.key==='ArrowUp')move(-1,0);
  else if(e.key==='ArrowDown')move(1,0);
  else if(e.key==='ArrowLeft')move(0,-1);
  else if(e.key==='ArrowRight')move(0,1);
  else if(e.key===' ')eat();
});
</script>
